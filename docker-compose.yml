# version: '3.8'

# Общие настройки
networks:
  kb-network:
    driver: bridge

services:
  db:
    image: postgres:15-alpine
    env_file: ./backend/.env  
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kb_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-knowledge_base}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kb-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kb_admin -d knowledge_base"]  # ✅ Проверяем именно `kb_admin`
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      KB_ENABLE_AI: ${KB_ENABLE_AI:-false}
      KB_ENABLE_SEMANTIC_SEARCH: ${KB_ENABLE_SEMANTIC_SEARCH:-false}
      KB_ENABLE_GAMIFICATION: ${KB_ENABLE_GAMIFICATION:-false}
      KB_ENABLE_GRAPH_VIEW: ${KB_ENABLE_GRAPH_VIEW:-true}
      KB_ENABLE_PUBLIC_PORTAL: ${KB_ENABLE_PUBLIC_PORTAL:-true}
      KB_SANDBOX_TTL_HOURS: ${KB_SANDBOX_TTL_HOURS:-72}
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py setup_kb_roles &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 3 backend.wsgi"
    volumes:
      - backend_static:/app/static
      - backend_media:/app/media
    networks:
      - kb-network
    depends_on:
      db:
        condition: service_healthy

  frontend:
    depends_on:
      - backend
    build: 
      context: ./frontend  # ✅ Контекст - это папка с фронтом
      dockerfile: Dockerfile  # ✅ Указываем правильный Dockerfile
      args:
        - VITE_API_URL=/
        - VITE_TINYMCE_API_KEY=${VITE_TINYMCE_API_KEY:-}
    # env_file:
    #   - ./frontend/.env  # Переменные для React
    ports:
      - "5173:80"
    networks:
      - kb-network

volumes:
  postgres_data:
  backend_static:
  backend_media: